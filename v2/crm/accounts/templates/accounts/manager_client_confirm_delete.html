{% extends 'base.html' %}
{% block title %}Удалить клиента{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-3">Удалить клиента</h5>
                <p>Вы уверены, что хотите удалить клиента <strong>{{ client.get_full_name }}</strong> ({{ client.email }})?</p>
                <p class="text-danger small">Все заказы этого клиента будут удалены вместе с ним.</p>
                <form method="post" class="d-flex gap-2 mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Удалить</button>
                    <a href="{% url 'manager_clients' %}" class="btn btn-outline-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

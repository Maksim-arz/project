{% extends 'base.html' %}
{% block title %}Личный кабинет{% endblock %}

{% block content %}
<h4 class="mb-4">Добро пожаловать, {{ request.user.get_full_name }}!</h4>

<div class="card" style="max-width: 400px;">
    <div class="card-body">
        <h6 class="card-subtitle text-muted mb-3">Ваши данные</h6>
        <p class="mb-1"><strong>Email:</strong> {{ request.user.email }}</p>
        {% if request.user.phone %}
            <p class="mb-1"><strong>Телефон:</strong> {{ request.user.phone }}</p>
        {% endif %}
    </div>
</div>
{% endblock %}

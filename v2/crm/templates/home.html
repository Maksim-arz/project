{% extends 'base.html' %}
{% block title %}CRM — Главная{% endblock %}

{% block content %}
<div class="row justify-content-center text-center mb-5">
    <div class="col-lg-5 col-md-7">
        <div class="icon-box icon-box-lg mx-auto mb-3">
            <i class="bi bi-fire"></i>
        </div>
        <h1 class="page-title mb-2">Food Order CRM</h1>
        <p class="text-muted">Система управления клиентами и заказами</p>
    </div>
</div>

<div class="row justify-content-center g-3">
    <div class="col-md-4 col-sm-6">
        <a href="{% url 'clients_list' %}" class="card-tile card p-4">
            <div class="d-flex align-items-center gap-3">
                <div class="icon-box"><i class="bi bi-people"></i></div>
                <div class="flex-grow-1">
                    <div class="fw-bold">Клиенты</div>
                    <div class="text-muted small">Управление базой клиентов</div>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </div>
        </a>
    </div>
    <div class="col-md-4 col-sm-6">
        <a href="{% url 'orders_list' %}" class="card-tile card p-4">
            <div class="d-flex align-items-center gap-3">
                <div class="icon-box"><i class="bi bi-receipt"></i></div>
                <div class="flex-grow-1">
                    <div class="fw-bold">Все заказы</div>
                    <div class="text-muted small">Просмотр и управление заказами</div>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </div>
        </a>
    </div>
</div>
{% endblock %}

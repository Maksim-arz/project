{% extends 'base.html' %}
{% block title %}Клиенты{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="page-title mb-0">Клиенты</h4>
    <a href="{% url 'client_add' %}" class="btn btn-primary btn-sm d-flex align-items-center gap-1">
        <i class="bi bi-plus-lg"></i> Добавить
    </a>
</div>

<div class="card">
    <table class="table mb-0">
        <thead>
            <tr>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Email</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for client in clients %}
            <tr>
                <td class="fw-bold small">{{ client.name }}</td>
                <td class="text-muted small">{{ client.phone }}</td>
                <td class="text-muted small">{{ client.email }}</td>
                <td>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{% url 'client_active_orders' client.pk %}" class="btn btn-sm btn-outline-primary">Активные</a>
                        <a href="{% url 'client_order_history' client.pk %}" class="btn btn-sm btn-outline-secondary">История</a>
                        <a href="{% url 'client_delete' client.pk %}" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center text-muted py-4">Клиентов нет.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

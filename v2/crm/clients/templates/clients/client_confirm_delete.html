{% extends 'base.html' %}
{% block title %}Удалить клиента{% endblock %}

{% block content %}
<div class="card border-danger" style="max-width: 480px;">
    <div class="card-body">
        <h5 class="card-title text-danger">Удалить клиента "{{ client.name }}"?</h5>
        <p class="card-text text-muted">Все его заказы тоже будут удалены.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'clients_list' %}" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}

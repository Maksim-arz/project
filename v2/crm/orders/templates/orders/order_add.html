{% extends 'base.html' %}
{% block title %}Добавить заказ{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 col-lg-5">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="{% url 'orders_list' %}" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
            <h4 class="page-title mb-0">Добавить заказ</h4>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Клиент</label>
                        <select name="client_id" class="form-select">
                            {% for client in clients %}
                            <option value="{{ client.pk }}">{{ client.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <input type="text" name="description" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Сумма (₸)</label>
                        <input type="number" name="price" class="form-control" step="0.01" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Приоритет</label>
                        <select name="priority" class="form-select">
                            {% for value, label in priorities %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Дедлайн</label>
                        <input type="date" name="deadline" class="form-control" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Сохранить</button>
                        <a href="{% url 'orders_list' %}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

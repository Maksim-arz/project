<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Заказы</title>
</head>
<body>
    <h1>Заказы</h1>
    <a href="#">Добавить заказ</a>
    <ul>
        {% for order in orders %}
        <li>{{ order.client }} — {{ order.description }} — {{ order.price }} — {{ order.status }}</li>
        {% empty %}
        <li>Заказов нет.</li>
        {% endfor %}
    </ul>
</body>
</html>

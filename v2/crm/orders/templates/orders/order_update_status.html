{% extends 'base.html' %}
{% block title %}Редактировать заказ{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 col-lg-5">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="{% url 'orders_list' %}" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
            <h4 class="page-title mb-0">Заказ #{{ order.pk }}</h4>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <input type="text" name="description" class="form-control" value="{{ order.description }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Статус</label>
                        <select name="status" class="form-select">
                            {% for value, label in statuses %}
                            <option value="{{ value }}" {% if order.status == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Приоритет</label>
                        <select name="priority" class="form-select">
                            {% for value, label in priorities %}
                            <option value="{{ value }}" {% if order.priority == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Сохранить</button>
                        <a href="{% url 'orders_list' %}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

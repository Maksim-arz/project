{% extends 'base.html' %}
{% block title %}Редактировать заказ{% endblock %}

{% block content %}
<h1 class="mb-4">Редактировать заказ #{{ order.pk }}</h1>
<form method="post" style="max-width: 480px;">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Описание</label>
        <input type="text" name="description" class="form-control" value="{{ order.description }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Статус</label>
        <select name="status" class="form-select">
            {% for value, label in statuses %}
            <option value="{{ value }}" {% if order.status == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Приоритет</label>
        <select name="priority" class="form-select">
            {% for value, label in priorities %}
            <option value="{{ value }}" {% if order.priority == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'orders_list' %}" class="btn btn-secondary ms-2">Назад</a>
</form>
{% endblock %}
